name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  unit_tests:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Unit Tests
        run: go test ./cmd/tfcred/commands/... -v

  e2e_tests:
    name: E2E Tests
    runs-on: windows-latest
    needs: [unit_tests, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: E2E Tests
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/tests/e2e/terraform.tfrc.json
          TF_TOKEN_ORG: ${{ secrets.TF_TOKEN_ORG }}
        run: go test ./tests/e2e/... -v -count=1

  build_release:
    name: Build Release
    runs-on: windows-latest
    needs: [unit_tests, lint]
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          $cleanVersion = $rawVersion -replace '^v', ''
          "version=$cleanVersion" >> $env:GITHUB_OUTPUT
          "tag=$rawVersion" >> $env:GITHUB_OUTPUT
      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate_winget:
    name: Validate Winget Assets
    needs: [build_release]
    runs-on: ubuntu-latest
    outputs:
      installer_url: ${{ steps.assets.outputs.installer_url }}
      sha: ${{ steps.crypto.outputs.sha }}
    steps:
      - name: Resolve release assets
        id: assets
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ needs.build_release.outputs.tag }}
        with:
          script: |
            const tag = process.env.INPUT_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            const match = release.data.assets.find(a => 
              a.name.toLowerCase().includes("windows") && 
              a.name.toLowerCase().includes("amd64") && 
              a.name.endsWith(".zip")
            );
            if (!match) throw new Error("Windows AMD64 zip not found");
            core.setOutput("installer_url", match.browser_download_url);

      - name: Download and compute SHA256
        id: crypto
        env:
          INSTALLER_URL: ${{ steps.assets.outputs.installer_url }}
        run: |
          set -euo pipefail
          curl -L "$INSTALLER_URL" -o artifact.zip
          SHA=$(sha256sum artifact.zip | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Validation Summary
        run: |
          echo "## Winget Validation Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: ${{ steps.crypto.outputs.sha }}" >> $GITHUB_STEP_SUMMARY

  submit_winget_pr:
    name: Submit to microsoft/winget-pkgs
    needs: [build_release, validate_winget]
    runs-on: ubuntu-latest
    steps:
      - name: Az CLI Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secret from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'kv-amiasea'
          secrets: 'amiasea-github-private-key'
        id: kv-fetch

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AMIASEA_GH_APP_CLIENT_ID }}
          private-key: ${{ steps.kv-fetch.outputs.amiasea-github-private-key }}
          owner: amiasea
          repositories: winget-pkgs

      - name: Submit manifests directly via GitHub API
        id: submit-manifests
        uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ needs.build_release.outputs.version }}
          INSTALLER_URL: ${{ needs.validate_winget.outputs.installer_url }}
          INSTALLER_SHA: ${{ needs.validate_winget.outputs.sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const version = process.env.INPUT_VERSION;
            const url = process.env.INSTALLER_URL;
            const sha = process.env.INSTALLER_SHA;
            const branchName = `winget-update-tfcred-${version}`;
            
            const file1Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0\nPackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nDefaultLocale: en-US\nManifestType: version\nManifestVersion: 1.12.0`;
            const file2Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0\nPackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nInstallerLocale: en-US\nArchitecture: x64\nInstallerType: zip\nNestedInstallerType: custom\nScope: user\nInstallModes:\n  - silent\n  - silentWithProgress\nInstallerSwitches:\n  Silent: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install\n  SilentWithProgress: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install\n  Custom: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install\n  Upgrade: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode upgrade\nUninstallCommand: powershell.exe -NoProfile -ExecutionPolicy Bypass -File "%USERPROFILE%\\AppData\\Local\\Programs\\tfcred\\uninstall.ps1"\nCommands:\n  - tfcred\n  - terraform-credentials-tfcred\nNestedInstallerFiles:\n  - RelativeFilePath: install.ps1\nArchiveBinariesDependOnPath: true\nInstallers:\n  - Architecture: x64\n    InstallerUrl: ${url}\n    InstallerSha256: ${sha}\nAppsAndFeaturesEntries:\n  - DisplayName: tfcred\n    Publisher: amiasea\n    DisplayVersion: ${version}\n    ProductCode: tfcred-v${version}\nManifestType: installer\nManifestVersion: 1.12.0`;
            const file3Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0\nPackageIdentifier: amiasea.tfcred\nPackageVersion: ${version}\nPackageLocale: en-US\nPublisher: amiasea\nPackageName: tfcred\nLicense: MIT\nShortDescription: Terraform credential context manager\nManifestType: defaultLocale\nManifestVersion: 1.12.0`;
            
            const manifestPath = `manifests/a/amiasea/tfcred/${version}`;
            
            const masterRef = await github.rest.git.getRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: 'heads/master'
            });
            
            await github.rest.git.createRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `refs/heads/${branchName}`,
              sha: masterRef.data.object.sha
            });
            
            async function commitFile(path, content, message) {
              await github.rest.repos.createOrUpdateFileContents({
                owner: 'amiasea',
                repo: 'winget-pkgs',
                path: path,
                message: message,
                content: Buffer.from(content).toString('base64'),
                branch: branchName
              });
            }
            
            await commitFile(`${manifestPath}/amiasea.tfcred.yaml`, file1Content, `feat: add version manifest for ${version}`);
            await commitFile(`${manifestPath}/amiasea.tfcred.installer.yaml`, file2Content, `feat: add installer manifest for ${version}`);
            await commitFile(`${manifestPath}/amiasea.tfcred.locale.en-US.yaml`, file3Content, `feat: add locale manifest for ${version}`);

            const pr = await github.rest.pulls.create({
            owner: 'microsoft',
            repo: 'winget-pkgs',
            title: `New version: amiasea.tfcred version ${version}`,
            body: `Automated WinGet submission update for amiasea.tfcred version ${version}.`,
            head: `amiasea:${branchName}`,
            base: 'master'
            });

            core.setOutput("pr_url", pr.data.html_url);
      - name: Summary
        run: |
            echo "## Winget PR Created Successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- PR: ${{ steps.submit-manifests.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
