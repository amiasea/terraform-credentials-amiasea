name: release

on:
  push:
    tags:
      - "v*"

# CRITICAL: id-token: write is required for Azure OIDC passwordless authentication
permissions:
  contents: write
  pull-requests: write
  id-token: write 

jobs:
  # --- Step 1: Lint Codebase Against Root .golangci.yml ---
  lint:
    name: lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: false # golangci-lint-action manages its own optimized caching internally

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # --- Step 2: Run Unit Tests Concurrently ---
  test:
    name: unit tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Run unit tests
        run: go test ./... -v

  # --- Step 3: Build, Verify E2E Architecture, and Deploy ---
  build_release:
    name: build + goreleaser
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Extract metadata
        id: meta
        run: |
          RAW_VERSION="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${RAW_VERSION#v}"
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${RAW_VERSION}" >> $GITHUB_OUTPUT

      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------------
      # E2E Helper Wiring Validation (Strict HashiCorp Location Simulation)
      # ----------------------------------------------------------------------
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.7

      - name: E2E helper wiring validation
        env:
          TF_CLI_CONFIG_FILE: /tmp/tfcred-test/terraform.tfrc
        run: |
          set -euo pipefail
          echo "[e2e] validating tfcred helper wiring with the compiled binary"
          
          # Fix 1: Create the strict native plugins directory layout path expected by install.ps1
          mkdir -p /tmp/tfcred-test/bin
          mkdir -p /tmp/tfcred-test/home/terraform.d/plugins
          
          export PATH="/tmp/tfcred-test/bin:$PATH"
          export HOME="/tmp/tfcred-test/home"
          export APPDATA="/tmp/tfcred-test/home"
          
          go build -ldflags "-X main.version=${{ steps.meta.outputs.version }}" -o /tmp/tfcred-test/bin/tfcred ./cmd/tfcred
          go build -ldflags "-X main.version=${{ steps.meta.outputs.version }}" -o /tmp/tfcred-test/home/terraform.d/plugins/terraform-credentials-tfcred ./cmd/tfcred
          
          chmod +x /tmp/tfcred-test/bin/tfcred /tmp/tfcred-test/home/terraform.d/plugins/terraform-credentials-tfcred
          
          tfcred --help >/dev/null
          tfcred version
          tfcred init --domain app.terraform.io
          
          echo "[e2e] injecting test team token metadata into tfcred"
          tfcred add --context ci-team-test --org ci-test-org --token-type team --domain app.terraform.io --token XXXXXXXXXXXXXX.atlasv1.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
          
          pwsh -File ./scripts/install.ps1
          
          test -f "$TF_CLI_CONFIG_FILE"
          
          grep -q 'credentials_helper "tfcred"' "$TF_CLI_CONFIG_FILE"
          
          tfcred list
          tfcred doctor
          terraform version

      # ----------------------------------------------------------------------
      # Secure Passwordless Retrieval of App Assets from Azure Key Vault
      # ----------------------------------------------------------------------
      - name: Az CLI Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secret from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'kv-tfcred'
          secrets: 'amiasea-github-private-key'
        id: kv-fetch

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.AMIASEA_GH_APP_ID }}
          private-key: ${{ steps.kv-fetch.outputs.amiasea-github-private-key }}
          owner: amiasea
          repositories: |
            terraform-credentials-tfcred

      # ----------------------------------------------------------------------
      # Trigger winget pipeline dispatch loop using GitHub App permissions
      # ----------------------------------------------------------------------
      - name: Trigger winget workflow
        uses: actions/github-script@v7
        env:
          WINGET_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          script: |
            // Instantiating custom client via App Token bypasses default GITHUB_TOKEN blocks
            const appOctokit = github.withAuth(process.env.WINGET_TOKEN);
            
            await appOctokit.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "winget.yml",
              ref: "main",
              inputs: {
                version: "${{ steps.meta.outputs.version }}",
                tag: "${{ steps.meta.outputs.tag }}"
              }
            });
