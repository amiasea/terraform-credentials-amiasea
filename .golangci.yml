version: "2"

run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none
  enable:
    - revive
    - govet
    - staticcheck
    - errcheck
    - gocyclo
    - misspell
    - unparam

# Fixed: Formatters must be completely separated into their own top-level block
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

linters-settings:
  revive:
    confidence: 0.8
    rules:
      # - name: exported
      #   severity: warning
      #   arguments:
      #     - "checkPrivateReceivers"
      - name: argument-limit
        severity: warning
        arguments: [5]
      - name: blank-imports
      - name: context-as-argument
  gocyclo:
    min-complexity: 15
  govet:
    enable-all: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
