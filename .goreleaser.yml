version: 2

project_name: terraform-credentials-tfcred

before:
  hooks:
    - go mod tidy

builds:
  # ============================================================================
  # User-facing CLI
  # ============================================================================
  - id: tfcred
    main: ./cmd/tfcred
    binary: tfcred
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64

  # ============================================================================
  # Terraform credentials helper
  # ============================================================================
  - id: terraform-credentials-tfcred
    main: ./cmd/terraform-credentials-tfcred
    binary: terraform-credentials-tfcred
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64

  # ============================================================================
  # Bootstrap installer
  # ============================================================================
  - id: tfcred-bootstrap
    main: ./cmd/installer
    binary: tfcred-bootstrap
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64


archives:
  - id: release-archive
    formats:
      - zip

    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

    files:
      - README*
      - LICENSE*

      # Installer payload
      - src: scripts/install.ps1
        dst: install.ps1

      - src: scripts/uninstall.ps1
        dst: uninstall.ps1


checksum:
  name_template: "checksums.txt"


release:
  github:
    owner: amiasea
    name: terraform-credentials-tfcred