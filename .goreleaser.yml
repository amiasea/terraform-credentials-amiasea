version: 2
project_name: terraform-credentials-tfcred

before:
  hooks:
    - go mod tidy

builds:
  - id: tfcred
    main: ./cmd/tfcred
    binary: terraform-credentials-tfcred
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: main-archive
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README*
      - LICENSE*
      - src: scripts/install.ps1
        dst: install.ps1
      - src: scripts/uninstall.ps1
        dst: uninstall.ps1

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: amiasea
    name: terraform-credentials-tfcred