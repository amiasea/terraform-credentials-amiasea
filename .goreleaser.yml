version: 2
project_name: terraform-credentials-tfcred

before:
  hooks:
    - go mod tidy

builds:
  # Main CLI tool
  - id: tfcred
    main: ./cmd/tfcred
    binary: tfcred
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64

  # Terraform credentials helper (Terraform plugin)
  - id: tfhelper
    main: ./cmd/tfhelper
    binary: terraform-credentials-tfcred
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: main-archive
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README*
      - LICENSE*

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: amiasea
    name: terraform-credentials-tfcred